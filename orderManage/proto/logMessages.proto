syntax = "proto3";
package LogProto;
import "marketMessages.proto";

message RabbitMSGIntent {
  bytes guid = 1;
  oneof msg {
    MarketProto.OrderMSG order = 2;
    MarketProto.SignupMSG signup = 3;
  }
}

message RabbitMSGSuccess {
  bytes guid = 1;
}

message AuditRecord {
  oneof record {
    RabbitMSGIntent intent = 1;
    RabbitMSGSuccess success = 2;
    MarketProto.SignupResponseMSG signup_response = 3;
    MarketProto.OrderResponseMSG order_response = 4;
    MarketProto.OrderFillMSG order_fill = 5;
  }
}